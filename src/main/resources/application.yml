spring:
  application:
    name: kim-math

  profiles:
    active: local

  data:
    web:
      pageable:
        default-page-size: 1000  # 기본 페이지 크기 증가
        max-page-size: 10000     # 최대 페이지 크기

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop  # 개발 환경: 시작 시 테이블 생성, 종료 시 삭제
      # ddl-auto: update  # 운영 환경: 스키마 업데이트만
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: false
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    session:
      timeout: 120m
      cookie:
        http-only: true
        same-site: lax

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# OpenAI API
openai:
  api:
    key: ${OPENAI_API_KEY:}
    model: gpt-5-mini
    max-tokens: 8192
    base-url: https://api.openai.com

# YouTube Data API v3
youtube:
  api:
    key: ${YOUTUBE_API_KEY:}

# Push notifications (FCM)
# enabled=false면 발송 코드는 동작하지 않고 로그만 남김(앱은 정상 부팅).
# 켜려면 PUSH_ENABLED=true + FCM_CREDENTIALS_PATH(서비스계정 JSON 경로) 지정.
# 경로를 비워두면 GOOGLE_APPLICATION_CREDENTIALS(ADC)로 폴백.
app:
  security:
    csrf:
      enabled: true
    remember-me:
      ttl-days: ${REMEMBER_ME_TTL_DAYS:30}
      cookie-secure: false
      same-site: Strict
  push:
    enabled: ${PUSH_ENABLED:false}
    fcm:
      credentials-path: ${FCM_CREDENTIALS_PATH:}
